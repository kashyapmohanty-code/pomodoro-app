<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenSpace - Premium Pomodoro Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-zinc-950 via-stone-900 to-emerald-950 text-stone-100 min-h-screen font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-300">

    <div class="container mx-auto px-4 py-6 max-w-5xl">
        <header class="flex justify-between items-center mb-8 glass rounded-2xl px-6 py-4">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400 flex items-center gap-2">
                <i class="fa-solid fa-seedling animate-pulse"></i> ZenSpace
            </h1>
            <div class="flex items-center gap-4">
                <span class="text-xs bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded-full font-mono">
                    Focus Mode Active
                </span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <section class="glass rounded-3xl p-6 flex flex-col gap-5 max-h-[580px] lg:h-[520px]">
                <h2 class="text-md font-semibold border-b border-white/5 pb-2 text-stone-300 flex justify-between items-center">
                    <span><i class="fa-solid fa-sliders text-emerald-400 mr-2"></i>Media Deck</span>
                    <span id="track-index-counter" class="text-[10px] text-emerald-400 font-mono bg-emerald-500/10 px-2 py-0.5 rounded">0 / 0</span>
                </h2>
                
                <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-3">
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <div id="audio-track-title" class="text-xs font-semibold text-stone-200 truncate">No files queued</div>
                            <div id="audio-status-tag" class="text-[10px] text-stone-500 truncate mt-0.5">Select a folder or batch below</div>
                        </div>
                        <input id="ambient-volume" type="range" min="0" max="1" step="0.05" value="0.5" title="Volume" class="w-16 accent-emerald-400 h-1 bg-white/10 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div class="space-y-1">
                        <input id="audio-timeline-scrubber" type="range" min="0" max="100" value="0" class="w-full accent-emerald-400 h-1 bg-white/10 rounded-lg appearance-none cursor-pointer">
                        <div class="flex justify-between text-[9px] font-mono text-stone-500">
                            <span id="audio-time-current">00:00</span>
                            <span id="audio-time-total">00:00</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-center gap-4 pt-1">
                        <button id="btn-media-prev" class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 active:scale-95 text-stone-300 flex items-center justify-center text-xs transition">
                            <i class="fa-solid fa-backward-step"></i>
                        </button>
                        <button id="btn-ambient-toggle" class="w-11 h-11 rounded-full bg-emerald-400 text-zinc-950 active:scale-95 flex items-center justify-center transition shadow-md shadow-emerald-400/10">
                            <i class="fa-solid fa-play text-xs pl-0.5"></i>
                        </button>
                        <button id="btn-media-next" class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 active:scale-95 text-stone-300 flex items-center justify-center text-xs transition">
                            <i class="fa-solid fa-forward-step"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-medium text-stone-400">Load Media Folder / Files</label>
                    <label class="flex items-center justify-center w-full h-16 border border-dashed rounded-xl cursor-pointer bg-black/10 border-white/10 hover:bg-black/20 hover:border-emerald-500/20 transition">
                        <div class="text-center">
                            <i class="fa-solid fa-folder-plus text-stone-400 text-sm mb-0.5"></i>
                            <p class="text-[10px] text-stone-400 font-medium">Select files or audio folder</p>
                        </div>
                        <input id="audio-file-uploader" type="file" accept="audio/*" multiple class="hidden" />
                    </label>
                </div>

                <div class="flex-1 overflow-y-auto bg-black/20 border border-white/5 rounded-xl p-2 custom-scrollbar">
                    <div id="playlist-queue-container" class="space-y-1 text-left">
                        <p class="text-[10px] text-stone-600 italic text-center py-4">Your track queue is currently empty</p>
                    </div>
                </div>
            </section>

            <section class="glass rounded-3xl p-6 flex flex-col items-center relative overflow-hidden">
                <div class="flex bg-black/30 border border-white/5 p-1 rounded-full mb-4 text-xs font-medium">
                    <button id="mode-pomo" class="px-4 py-2 rounded-full bg-emerald-500 text-zinc-950 font-bold transition-all duration-300">Pomodoro</button>
                    <button id="mode-break" class="px-4 py-2 rounded-full text-stone-400 hover:text-stone-200 transition-all duration-300">Short Break</button>
                </div>

                <div class="flex gap-4 mb-6 bg-black/20 px-4 py-2 rounded-xl border border-white/5 text-xs">
                    <div class="flex items-center gap-1.5">
                        <label class="text-stone-400">Work:</label>
                        <input id="input-pomo-time" type="number" min="1" max="180" value="25" class="w-10 bg-white/5 border border-white/10 rounded px-1 py-0.5 text-center font-mono text-emerald-400 focus:outline-none focus:border-emerald-500">
                        <span class="text-stone-500">m</span>
                    </div>
                    <span class="text-stone-700">|</span>
                    <div class="flex items-center gap-1.5">
                        <label class="text-stone-400">Break:</label>
                        <input id="input-break-time" type="number" min="1" max="60" value="5" class="w-10 bg-white/5 border border-white/10 rounded px-1 py-0.5 text-center font-mono text-emerald-400 focus:outline-none focus:border-emerald-500">
                        <span class="text-stone-500">m</span>
                    </div>
                </div>

                <div class="w-56 h-56 flex flex-col items-center justify-center relative mb-4">
                    <div id="graphic-canvas" class="w-full h-full absolute inset-0 flex items-center justify-center">
                        </div>
                    <div class="z-10 text-4xl font-mono font-bold tracking-tight bg-zinc-950/60 backdrop-blur-sm px-4 py-2 rounded-xl border border-white/5" id="timer-display">25:00</div>
                </div>

                <div class="flex items-center gap-2 mb-6 bg-white/5 px-3 py-2 rounded-xl border border-white/5 text-xs w-full max-w-[200px]">
                    <i class="fa-solid fa-palette text-emerald-400"></i>
                    <select id="theme-selector" class="bg-transparent text-stone-300 w-full focus:outline-none cursor-pointer font-medium">
                        <option value="candle" class="bg-zinc-900 text-stone-300">🔥 Candle Burning</option>
                        <option value="ice" class="bg-zinc-900 text-stone-300">❄️ Ice Melting</option>
                        <option value="hourglass" class="bg-zinc-900 text-stone-300">⏳ Hourglass Sand</option>
                        <option value="plant" class="bg-zinc-900 text-stone-300">🌱 Growing Plant</option>
                    </select>
                </div>

                <div class="flex gap-4 items-center">
                    <button id="btn-reset" class="glass w-12 h-12 rounded-full flex items-center justify-center text-stone-400 hover:text-stone-100 transition-all duration-200">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <button id="btn-start" class="bg-emerald-400 text-zinc-950 px-10 py-3.5 rounded-full font-bold shadow-lg shadow-emerald-500/20 hover:scale-105 active:scale-95 transition-all duration-200 tracking-wide text-sm">
                        START FOCUS
                    </button>
                    <button id="btn-skip" class="glass w-12 h-12 rounded-full flex items-center justify-center text-stone-400 hover:text-stone-100 transition-all duration-200">
                        <i class="fa-solid fa-forward"></i>
                    </button>
                </div>
            </section>

            <section class="glass rounded-3xl p-6 flex flex-col h-[460px] lg:h-[520px]">
                <div class="flex items-center justify-between border-b border-white/5 pb-3 mb-4">
                    <h2 class="text-lg font-semibold text-stone-300">
                        <i class="fa-solid fa-list-check text-emerald-400 mr-2"></i>Tasks Engine
                    </h2>
                    <span id="task-count" class="text-xs font-mono bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 px-2.5 py-1 rounded-full">0/0 Completed</span>
                </div>

                <form id="task-form" class="flex gap-2 mb-4">
                    <input type="text" id="task-input" placeholder="Add target objective..." required
                           class="flex-1 bg-black/20 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-500/50 transition text-stone-200 placeholder:text-stone-600">
                    <button type="submit" class="bg-stone-100 text-zinc-950 px-4 rounded-xl font-medium hover:bg-stone-200 active:scale-95 transition">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </form>

                <div id="tasks-container" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar"></div>
            </section>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script src="js/storage.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
